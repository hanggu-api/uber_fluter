name: uber_flutter_cliente
description: App Cliente UberFlutter - Rede Social Gastronômica
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase
  supabase_flutter: ^2.3.0
  
  # UI e Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # Vídeo e Mídia
  video_player: ^2.8.2
  chewie: ^1.7.4
  photo_view: ^0.14.0
  
  # QR Code
  qr_code_scanner: ^1.0.1
  qr_flutter: ^4.1.0
  
  # Pagamentos
  flutter_stripe: ^10.0.0
  flutter_paypal_payment: ^1.0.6
  
  # Mapas e Localização
  google_maps_flutter: ^2.5.3
  geolocator: ^10.1.0
  location: ^5.0.3
  
  # Notificações
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.9
  flutter_local_notifications: ^16.3.2
  
  # Segurança
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8
  device_info_plus: ^9.1.2
  
  # Estado e Navegação
  provider: ^6.1.1
  go_router: ^13.2.0
  
  # Utilitários
  intl: ^0.18.1
  url_launcher: ^6.2.4
  share_plus: ^7.2.1
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
