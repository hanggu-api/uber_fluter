name: uber_flutter_cliente
description: App Cliente - Rede Social Gastronômica com Delivery
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Supabase
  supabase_flutter: ^2.3.0
  
  # Estado e Navegação
  provider: ^6.1.1
  go_router: ^13.1.0
  
  # UI e Componentes
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  carousel_slider: ^4.2.1
  video_player: ^2.8.2
  chewie: ^1.7.4
  
  # QR Code e Camera
  mobile_scanner: ^4.0.1
  
  # Pagamentos
  flutter_stripe: ^10.0.0
  
  # Utilitários
  intl: ^0.19.0
  url_launcher: ^6.2.4
  image_picker: ^1.0.7
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  
  # Notificações
  firebase_core: ^2.25.4
  firebase_messaging: ^14.7.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
